<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <p class="kicker">Listen</p>
<h1>Listen</h1>
<p>Spoken guidance, ready when you need it.</p>
    </header>

    <section class="panel">
  <button class="play-button" type="button" onclick="document.getElementById('audio').play()">
    Tap and listen
  </button>

  <audio id="audio">
    <source src="audio/lets-make-a-coffee.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</section>
  </main>
</body>
</html>
