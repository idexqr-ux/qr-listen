<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coffee Machine — Listen</title>
  <meta name="description" content="Simple spoken guidance for using the coffee machine." />
  <link rel="stylesheet" href="style.css?v=10" />
</head>

<body>
  <main>
    <header class="wrap hero">
      <h1 class="light-heading">Coffee Machine</h1>

      <p class="intro">
        Simple everyday help.
      </p>

      <img src="images/coffee.jpg" alt="Coffee machine" class="object-image" />

      <button type="button" class="quiet-button" onclick="playEmbeddedAudio('arrivalAudio')">
        Start here
      </button>

      <p class="sr-only">
        You’ve opened the coffee machine guide.
      </p>

      <p class="sr-only">
        Choose an option below to hear step-by-step guidance.
      </p>
    </header>

    <section class="wrap tasks">
      <h2>Making a coffee</h2>
      <button type="button" class="quiet-button" onclick="playEmbeddedAudio('coffeeAudio')">
        Listen
      </button>

      <h2>Refilling the water</h2>
      <button type="button" class="quiet-button" onclick="playEmbeddedAudio('waterAudio')">
        Listen
      </button>

      <h2>Emptying used pods</h2>
      <button type="button" class="quiet-button" onclick="playEmbeddedAudio('podsAudio')">
        Listen
      </button>
    </section>

    <div class="wrap footer-wrap">
      <p class="powered-by">Powered by IdexQR</p>
    </div>
  </main>

  <audio id="arrivalAudio" src="audio/at-the-coffee-machine.mp3" preload="auto"></audio>
  <audio id="coffeeAudio" src="audio/lets-make-a-coffee.mp3" preload="auto"></audio>
  <audio id="waterAudio" src="audio/refill-water.mp3" preload="auto"></audio>
  <audio id="podsAudio" src="audio/empty-pods.mp3" preload="auto"></audio>

  <script>
    let currentAudio = null;

    function stopCurrentAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
    }

    function playEmbeddedAudio(id) {
      stopCurrentAudio();
      currentAudio = document.getElementById(id);

      if (!currentAudio) return;

      currentAudio.currentTime = 0;

      const playPromise = currentAudio.play();
      if (playPromise !== undefined) {
        playPromise.catch(err => {
          console.error("Embedded audio failed:", id, err);
        });
      }
    }
  </script>
</body>
</html>
