  <button type="button" onclick="show('coffee')">Make a coffee</button>

</div>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listen | IdexQR</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #F7F9F8;
      color: #2b2b2b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }

    .wrap {
      width: min(92%, 420px);
    }

    h1 {
      margin-bottom: 8px;
      font-weight: normal;
    }

    p {
      margin-top: 0;
      line-height: 1.5;
    }

    .listen-card {
      margin-top: 18px;
      background: #B8C6C1;
      border-radius: 18px;
      overflow: hidden;
      text-align: left;
    }

    .listen-details {
      padding: 16px;
    }

    .listen-summary {
      cursor: pointer;
      list-style: none;
      font-size: 20px;
      letter-spacing: 1px;
      outline: none;
    }

    .listen-summary::-webkit-details-marker {
      display: none;
    }

    .listen-text {
      margin-top: 12px;
      margin-bottom: 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #2b2b2b;
      text-decoration: none;
      border-bottom: 1px solid rgba(43,43,43,0.25);
      padding-bottom: 2px;
    }

    .back-link:hover {
      border-bottom-color: rgba(43,43,43,0.5);
    }

    .powered-by {
      margin-top: 33px;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: #5b6770;
      text-align: center;
      opacity: 0.7;
    }

    .footer {
      padding: 20px 0 28px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Listen</h1>
    <p>Spoken guidance, ready when you need it.</p>

   <p class="browse-label" id="help-options">What would you like help with?</p>

<div class="chips" role="group" aria-labelledby="help-options">
  <button type="button" onclick="show('coffee')">Make a coffee</button>
  <button type="button" onclick="show('water')">Refill the water</button>
  <button type="button" onclick="show('pods')">Empty used pods</button>
</div>

    <p class="powered-by">Powered by IdexQR</p>

    <footer class="footer">
      <a href="https://idexqr.com" class="back-link">Back to IdexQR</a>
    </footer>
  </div>

  <script>
    let currentAudio = null;

    function playAudio(file) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      currentAudio = new Audio(file);
      currentAudio.preload = 'auto';
      currentAudio.playsInline = true;

      currentAudio.play().catch(err => {
        console.error("Audio failed to play:", file, err);
      });
    }
  </script>
</body>
</html>
